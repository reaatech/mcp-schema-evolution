name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22

jobs:
  # ─────────────────────────────────────────────
  # Setup & Install
  # ─────────────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Save pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

  # ─────────────────────────────────────────────
  # Security Audit
  # ─────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level moderate

  # ─────────────────────────────────────────────
  # Code Format Check
  # ─────────────────────────────────────────────
  format:
    name: Code Format
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore dependencies
        uses: actions/cache@v4
        id: cache-restore-format
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Re-link workspace packages
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Check formatting
        run: pnpm biome format --write . && git diff --exit-code

  # ─────────────────────────────────────────────
  # Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore dependencies
        uses: actions/cache@v4
        id: cache-restore-lint
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Re-link workspace packages
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Lint
        run: pnpm lint

  # ─────────────────────────────────────────────
  # Type Check
  # ─────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore dependencies
        uses: actions/cache@v4
        id: cache-restore-typecheck
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Re-link workspace packages
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Type check
        run: pnpm typecheck

  # ─────────────────────────────────────────────
  # Build
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Re-link workspace packages
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build packages
        run: pnpm build

  # ─────────────────────────────────────────────
  # Test
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Re-link workspace packages
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

  # ─────────────────────────────────────────────
  # Coverage
  # ─────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Re-link workspace packages
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build packages
        run: pnpm build

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: packages/*/coverage
          retention-days: 7

      - name: Post coverage summary
        run: |
          echo '## Test Coverage Summary' >> $GITHUB_STEP_SUMMARY
          for pkg in packages/*/coverage/coverage-summary.json; do
            if [ -f "$pkg" ]; then
              name=$(basename $(dirname $(dirname "$pkg")))
              lines=$(jq -r '.total.lines.pct // "N/A"' "$pkg")
              funcs=$(jq -r '.total.functions.pct // "N/A"' "$pkg")
              branches=$(jq -r '.total.branches.pct // "N/A"' "$pkg")
              echo "| $name | $lines% | $funcs% | $branches% |" >> $GITHUB_STEP_SUMMARY
            fi
          done

  # ─────────────────────────────────────────────
  # All Checks Passed
  # ─────────────────────────────────────────────
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [audit, format, lint, typecheck, build, test, coverage]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          check() {
            if [ "$1" != "success" ]; then
              echo "$2 did not succeed: $1"
              exit 1
            fi
          }
          check '${{ needs.audit.result }}' 'Security Audit'
          check '${{ needs.format.result }}' 'Code Format'
          check '${{ needs.lint.result }}' 'Lint'
          check '${{ needs.typecheck.result }}' 'Type Check'
          check '${{ needs.build.result }}' 'Build'
          check '${{ needs.test.result }}' 'Test'
          check '${{ needs.coverage.result }}' 'Coverage'
          echo "All checks passed!"
